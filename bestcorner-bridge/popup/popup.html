<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e293b;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #f8fafc;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status-dot.active {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    .info {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="Logo">
    <div class="title">BestCorner Bridge</div>
  </div>

  <div class="status">
    <div class="status-dot active" id="dot"></div>
    <span id="status-text">Ativo e aguardando jogos...</span>
  </div>

  <div class="info">
    Abra a página do BestCornerStats e mantenha a aba aberta.<br><br>
    Os dados serão enviados automaticamente para o TradeMoreira.
  </div>

  <script src="popup.js"></script>
</body>
</html>
