<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 16px;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header-icon {
      font-size: 18px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.3px;
      flex: 1;
    }
    .header .version {
      font-size: 10px;
      color: #475569;
      font-weight: 400;
    }

    /* ─── Toggle Switch ─── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b22;
    }
    .toggle-label {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .toggle-sublabel {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #94a3b8;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background-color: #10b981;
    }
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(18px);
      background-color: #ffffff;
    }

    /* ─── Stats ─── */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 12px;
      border-bottom: 1px solid #1e293b22;
    }
    .stats-label {
      color: #94a3b8;
      font-weight: 600;
    }
    .stats-value {
      color: #e2e8f0;
      font-weight: 700;
    }
    .stats-value.green { color: #10b981; }
    .stats-value.yellow { color: #f59e0b; }
    .stats-value.red { color: #ef4444; }

    /* ─── Status Banner ─── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 11px;
      font-weight: 600;
    }
    .status-banner.active {
      background: #10b98118;
      color: #10b981;
      border: 1px solid #10b98133;
    }
    .status-banner.inactive {
      background: #f59e0b18;
      color: #f59e0b;
      border: 1px solid #f59e0b33;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }
    .status-dot.inactive {
      background: #f59e0b;
    }

    /* ─── Seção de Ligas ─── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 14px;
      margin-bottom: 8px;
    }
    .league-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 4px;
    }
    .league-list::-webkit-scrollbar {
      width: 4px;
    }
    .league-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .league-list::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    .league-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .league-item:hover {
      background: #1e293b;
    }
    .league-item input[type="checkbox"] {
      accent-color: #10b981;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .league-item .league-name {
      flex: 1;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .league-item .league-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .league-tag.auto {
      background: #ef444422;
      color: #ef4444;
    }
    .league-tag.blocked {
      background: #f59e0b22;
      color: #f59e0b;
    }
    .league-tag.count {
      background: #10b98122;
      color: #10b981;
    }
    .empty-leagues {
      text-align: center;
      padding: 16px;
      color: #475569;
      font-size: 11px;
    }

    /* ─── Botões ─── */
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s;
    }
    .btn:hover {
      opacity: 0.85;
    }
    .btn-clear {
      background: #1e293b;
      color: #94a3b8;
    }
    .btn-clear:hover {
      background: #334155;
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #1e293b;
      font-size: 10px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🎰</span>
    <h1>Bet365 Scanner</h1>
    <span class="version">v1.0.0</span>
  </div>

  <!-- Status Banner -->
  <div class="status-banner inactive" id="statusBanner">
    <span class="status-dot inactive" id="statusDot"></span>
    <span id="statusText">Scanner desligado</span>
  </div>

  <!-- Toggle: Scanner ON/OFF -->
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Scanner</div>
      <div class="toggle-sublabel">Escanear jogos ao vivo</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleScanner">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <span class="stats-label">Jogos Detectados</span>
    <span class="stats-value green" id="matchCount">0</span>
  </div>
  <div class="stats-row">
    <span class="stats-label">Ligas Detectadas</span>
    <span class="stats-value" id="leagueCount">0</span>
  </div>
  <div class="stats-row">
    <span class="stats-label">Último Scan</span>
    <span class="stats-value" id="lastScan">—</span>
  </div>

  <!-- League List -->
  <div class="section-title">Ligas Detectadas</div>
  <div class="league-list" id="leagueList">
    <div class="empty-leagues">Aguardando scan...</div>
  </div>

  <!-- Buttons -->
  <button class="btn btn-clear" id="btnClear">🗑 Limpar Bloqueios</button>

  <!-- Footer -->
  <div class="footer">
    Sports Trading Platform — Scanner de Jogos ao Vivo
  </div>

  <script src="popup.js"></script>
</body>
</html>
